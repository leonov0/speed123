<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: black;
    }

    .block {


      display: flex;
      gap: 2rem;
    }

    .inner-block {
      position: relative;
      width: 200px;
      height: 200px;
    }

    .ball {
      position: absolute;
      height: 5rem;
      width: 5rem;
      border-radius: 50%;
      background-color: white;
      animation: bounce 1s ease-in-out infinite;
    }

    .shadow {
      position: absolute;
      height: 5rem;
      width: 5rem;
      border-radius: 50%;
      background-color: white;
      filter: blur(8px);
      transform: translateY(40px);
      animation: shadow 1s ease-in-out infinite;

    }

    @keyframes bounce {
      0% {
        transform: scale(1);
        transform: translateY(0);
      }

      40% {
        transform: translateY(-200px) scale(0.9, 1);
      }

      60% {
        transform: translateY(-200px) scale(0.9, 1);


      }

      100% {
        transform: scale(1);

        transform: translateY(0);
      }
    }

    @keyframes shadow {
      0% {
        opacity: 1;

      }

      40% {
        transform: scale(0.1);

        opacity: 0.2;

      }

      60% {
        transform: scale(0.1);

        opacity: 0.2;

      }

      100% {
        opacity: 1;

      }
    }

    .ball-top {
      top: -50px;
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="block">
      <div class="inner-block">
        <div class="ball"></div>
        <div class="shadow"></div>
      </div>
      <div class="inner-block">
        <div class="ball ball-top"></div>
        <div class="shadow ball-top"></div>
      </div>
      <div class="inner-block">
        <div class="ball"></div>
        <div class="shadow"></div>
      </div>
    </div>
  </main>
</body>

</html>
